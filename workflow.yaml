apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: bm25-ranking-pipeline-
  namespace: argo
spec:
  entrypoint: ranking-dag
  volumes:
    - name: pipeline-storage
      persistentVolumeClaim:
        claimName: argo-pvc

  templates:
    - name: ranking-dag
      dag:
        tasks:
          # STEP 1: Feast apply
          - name: feast-apply
            template: run-python-step
            arguments:
              parameters:
                - name: script
                  value: |
                    import os
                    import shutil
                    import subprocess

                    # Source repo inside container
                    SRC_REPO = "/app/feature_repo"

                    # Destination in PVC
                    DST_REPO = os.getenv("FEAST_REPO_PATH", "/mnt/data/feature_repo")

                    # Copy repo if not already there
                    if not os.path.exists(DST_REPO):
                        shutil.copytree(SRC_REPO, DST_REPO)

                    os.chdir(DST_REPO)

                    result = subprocess.run(["feast", "apply"], capture_output=True, text=True)

                    print(result.stdout)

                    if result.returncode != 0:
                        print(result.stderr)
                        raise RuntimeError("Feast apply failed")
                    else:
                        print("✅ Feast apply completed successfully")

          # STEP 2: Ingest features into Feast
          - name: ingest-to-feast
            dependencies: [feast-apply]
            template: ingest-template

          # STEP 3: Train the model
          - name: ridge-training
            dependencies: [ingest-to-feast]
            template: run-python-step
            arguments:
              parameters:
                - name: script
                  value: |
                    import numpy as np
                    from src import ridge_normalize as ridge
                    import yaml, os

                    with open('/app/configs/config.yaml') as f: 
                        config = yaml.safe_load(f)

                    # FEAST_REPO_PATH must remain exactly as feast-apply
                    repo_path = os.getenv("FEAST_REPO_PATH", "/mnt/data/feature_repo")

                    # Output CSV can go inside the PVC mount to persist
                    output_file = "/mnt/data/bm25_field_weights.csv"

                    ridge.run(
                        repo_path=repo_path,
                        clicks_json=config['data']['clicks_json'],
                        bm25_fields=config['features']['bm25_fields'],
                        alpha=config['ridge']['alpha'],
                        output_file=output_file
                    )

    - name: run-python-step
      inputs:
        parameters:
          - name: script
      container:
        image: bm25-pipeline:local
        imagePullPolicy: Never
        command: ["python", "-c"]
        args: ["{{inputs.parameters.script}}"]
        env:
          - name: FEAST_REPO_PATH
            value: "/mnt/data/feature_repo"
        volumeMounts:
          - name: pipeline-storage
            mountPath: /mnt/data

    - name: ingest-template
      container:
        image: bm25-pipeline:local
        imagePullPolicy: Never
        command: ["python", "-c"]
        args:
          - |
            from src.generate_features_wide import parse_and_compute
            import pandas as pd
            import os
            from pathlib import Path

            # PVC-mounted base directory
            BASE_DIR = Path(os.getenv("APP_BASE_DIR", "/mnt/data"))

            # Directory to store Feast data
            FEAST_DATA_DIR = BASE_DIR / "feature_repo" / "data"
            FEAST_DATA_DIR.mkdir(parents=True, exist_ok=True)

            all_features = []
            for file_path in [BASE_DIR / "data" / "person_search_debugQueries.json"]:
                all_features.extend(parse_and_compute(file_path))

            df = pd.DataFrame(all_features)
            df["event_timestamp"] = pd.Timestamp.now(tz="UTC")

            # Save JSON (optional)
            df.to_json(BASE_DIR / "features.json", orient="records", indent=2)

            # Save Parquet for Feast in PVC
            parquet_file = FEAST_DATA_DIR / "documents.parquet"
            df.to_parquet(parquet_file, index=False)

            print(f"✅ Features saved for Feast: {parquet_file}")